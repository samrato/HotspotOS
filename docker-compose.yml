version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotspotos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotspotos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotspotos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: hotspotos-api
    network_mode: host
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@localhost:5432/hotspotos?sslmode=disable
      - REDIS_URL=localhost:6379
      - JWT_SECRET=super_secret_jwt_key_hotspotos
      - NETWORK_MANAGER_URL=http://localhost:8081
      - PAYMENT_SERVICE_URL=http://localhost:8082
      - GATEWAY_IP=192.168.12.1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.payment-service
    container_name: hotspotos-payment-service
    network_mode: host
    env_file:
      - .env
    environment:
      - PORT=8082
      - DATABASE_URL=postgres://postgres:postgres@localhost:5432/hotspotos?sslmode=disable
      - REDIS_URL=localhost:6379
      - API_INTERNAL_URL=http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: hotspotos-dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api

volumes:
  pgdata:
    driver: local
